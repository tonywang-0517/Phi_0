# @package _global_
# Train Phi_0 on Xperience with unified 512-d SMPL-H action GT (ACT head).

defaults:
  - train_full
  - data: xperience_unified
  - override /model: phi0_xperience_unified
  - _self_

seed: 42
output_dir: ./experiments/xperience_unified_act_1k_ddp4
checkpoint_name: xperience_unified_act
max_steps: 1000
save_every_steps: 0
checkpoint_overwrite: true
auto_resume: false
save_action_expert_only: true
save_optimizer: false

batch_size: 4
num_workers: 4
prefetch_factor: 2
learning_rate: 0.0
learning_rate_backbone: 0.0
learning_rate_action: 1.0e-4
learning_rate_warmup_steps: 100
learning_rate_scheduler: cosine
weight_decay: 1.0e-6
adam_beta1: 0.95
adam_beta2: 0.999
mixed_precision: bf16
device: cuda
distributed: false
ddp_find_unused_parameters: true
repeated_action_steps: 1

data:
  action_stats_path: null
  auto_compute_action_stats: true
  seq_len: 33

model:
  action_head: act
  freeze_vlm: true
  vlm:
    img_aug: true
    attn_implementation: sdpa
  vggt:
    enabled: false

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
