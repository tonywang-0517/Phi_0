# @package _global_
# Phi_0 ACT fine-tune on pick-tissue unified 512-d — 4-GPU DDP, 3k steps.

defaults:
  - train_pick_tissue_xperience_unified_ddp4_8k
  - _self_

output_dir: ./experiments/pick_tissue_xperience_unified_3k_ddp4_fast
max_steps: 3000
save_every_steps: 3000

# Speed (more VRAM): larger per-GPU batch + cheaper DDP reducer
batch_size: 16
ddp_find_unused_parameters: false
train_cpu_prefetch: 6
train_gpu_pipeline_depth: 3
prefetch_factor: 6
num_workers: 8
