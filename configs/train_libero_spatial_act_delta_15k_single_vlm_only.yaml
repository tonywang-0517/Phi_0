# @package _global_
# Ablation: frozen VLM + ACT head only (no VGGT tower, interleave_vlm cross-attn).
# Hyperparams match train_libero_spatial_act_delta_15k_single for fair comparison.

defaults:
  - train_libero_spatial_act_delta_15k_single
  - override /model: phi0_full
  - _self_

output_dir: ./experiments/libero_spatial_vlm_only_15k_single
checkpoint_name: libero_spatial_vlm_only_15k_single

model:
  robot_action_dim: 7
  robot_action_loss_type: l1
  prompt_max_length: 1536
  action_head: act
  freeze_vlm: true
  past_action_window_size: 1
  vlm:
    img_aug: true
  vggt:
    enabled: false
  action_dit_config:
    action_cross_attn_mode: interleave_vlm
    use_gradient_checkpointing: false
  loss:
    lambda_video: 0.0
    lambda_action: 1.0
    lambda_bone: 0.0
    lambda_bone_hand: 0.0
    lambda_bone_dir: 0.0
    lambda_hand_mse: 0.0
