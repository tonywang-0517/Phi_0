# @package _global_
# Single-GPU — align batch/LR/schedule with Psi0 finetune-simple-psi0.sh

defaults:
  - train_libero_spatial_act_delta_15k
  - _self_

output_dir: ./experiments/libero_spatial_vlm_dual_15k_single
checkpoint_name: libero_spatial_vlm_dual_15k_single
device: cuda:0
distributed: false

# Psi0 finetune-simple: per_device batch=16, lr=1e-4, warmup=1000, cosine, AdamW(0.95,0.999), wd=1e-6
batch_size: 16
num_workers: 8
prefetch_factor: 4
train_cpu_prefetch: 4
train_gpu_pipeline: true
train_drop_last: true
compile_action_expert: false

lr_scale: none
learning_rate_action: 1.0e-4
learning_rate_warmup_steps: 1000
learning_rate_scheduler: cosine
learning_rate_backbone: 0.0
weight_decay: 1.0e-6
adam_beta1: 0.95
adam_beta2: 0.999
adam_eps: 1.0e-8

train_log_every_steps: 1
