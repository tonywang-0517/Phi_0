# @package _global_
# ACT + absolute-EEF proprio prefix + 8-step delta EEF chunk (VLA-Adapter / DiT4DiT LIBERO).

defaults:
  - train_full
  - data: libero_spatial
  - override /model: phi0_dual_vggt
  - _self_

output_dir: ./experiments/libero_spatial_act_delta_8
checkpoint_name: libero_spatial_act_delta_8
max_steps: 3000
save_every_steps: 500
checkpoint_overwrite: true
auto_resume: true
save_action_expert_only: true
save_optimizer: false
resume_ckpt: null
fastwam_ckpt: null

device: cuda
batch_size: 4  # reduce to 2 if OOM after disabling action GC / enabling compile
num_workers: 8
prefetch_factor: 4
train_cpu_prefetch: 2
repeated_action_steps: 1
compile_action_expert: true
compile_action_expert_mode: default
learning_rate_action: 1.5e-4
learning_rate_backbone: 0.0

model:
  robot_action_dim: 7
  robot_action_loss_type: l1
  prompt_max_length: 1536
  action_head: act
  freeze_vlm: true
  past_action_window_size: 1
  vlm:
    img_aug: true
  vggt:
    freeze: true
  action_dit_config:
    use_gradient_checkpointing: false
  loss:
    lambda_video: 0.0
    lambda_action: 1.0
    lambda_bone: 0.0
    lambda_bone_hand: 0.0
    lambda_bone_dir: 0.0
    lambda_hand_mse: 0.0
