# @package _global_
# Legacy absolute-EEF 19-step ACT (use data/libero_spatial_absolute via override).

defaults:
  - train_full
  - data: libero_spatial_absolute
  - override /model: phi0_dual_vggt
  - _self_

output_dir: ./experiments/libero_spatial_act_eef_300
checkpoint_name: libero_spatial_act_eef_300
max_steps: 3000
save_every_steps: 500
checkpoint_overwrite: true
save_action_expert_only: true
save_optimizer: false
resume_ckpt: null
fastwam_ckpt: null

device: cuda
batch_size: 4
num_workers: 2
repeated_action_steps: 1
learning_rate_action: 1.5e-4
learning_rate_backbone: 0.0

model:
  robot_action_dim: 7
  prompt_max_length: 1536
  action_head: act
  freeze_transformer: true
  past_action_window_size: 5
  video_fm:
    num_latent_conditional_frames: 2
  action_dit_config:
    use_gradient_checkpointing: true
  loss:
    lambda_video: 0.0
    lambda_action: 1.0
    lambda_bone: 0.0
    lambda_bone_hand: 0.0
    lambda_bone_dir: 0.0
    lambda_hand_mse: 0.0
