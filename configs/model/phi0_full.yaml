# Full Phi_0: Qwen3-VL-2B (Psi0-style) + ACT action head + optional VGGT dual cross-attn

vlm:
  model_path: ./checkpoints/psi0/pre.fast.1by1.2601091803.ckpt.ego200k.he30k/psi0/pre.fast.1by1.2601091803.ckpt.ego200k.he30k
  freeze: true
  attn_implementation: sdpa  # use flash_attention_2 when flash_attn is installed
  local_files_only: true
  # Psi0 finetune-simple-psi0.sh: resize/center_crop 180×320 (H×W)
  image_size: [180, 320]
  img_aug: false

prompt_max_length: 512
# Single current-frame proprio prefix (no action history).
past_action_window_size: 1
vggt_use_full_video: false

raw_action_dim: 256
action_head: act  # act (default) | fm

action_dit_config:
  hidden_dim: 2048  # match Qwen3-VL / VGGT register dim (no context Linear)
  ffn_dim: 8192
  num_heads: 16
  attn_head_dim: 128
  num_layers: 6  # align with Psi0 action_num_blocks
  text_dim: 2048  # Qwen3-VL-2B hidden size
  freq_dim: 256
  eps: 1.0e-06
  use_gradient_checkpointing: false
  action_cross_attn_mode: interleave_vlm
  add_pos_embed: true
  future_placeholder_noise_std: 0.02

action_fm:
  noise_beta_alpha: 1.5
  noise_beta_beta: 1.0
  noise_s: 0.999
  num_timestep_buckets: 1000
  num_inference_timesteps: 4

loss:
  lambda_video: 0.0
  lambda_action: 1.0
  lambda_bone: 0.5
  lambda_bone_hand: 0.5
  lambda_bone_dir: 0.3
  lambda_hand_mse: 0.5

vggt:
  enabled: false
  checkpoint_path: /mnt/data2/wpy/workspace/vggt-omega/checkpoints/vggt_omega_1b_512.pt
  image_resolution: 512
  freeze: true
