# Phi_0 + dual cross-attn: even layers VLM, odd layers VGGT scene registers.

defaults:
  - phi0_full
  - _self_

vggt_use_full_video: false

action_dit_config:
  action_cross_attn_mode: dual_vlm_vggt

vggt:
  enabled: true
  checkpoint_path: ${oc.env:PHI0_WORKSPACE,/home/user}/vggt-omega/checkpoints/vggt_omega_1b_512.pt
  image_resolution: 512
  freeze: true
