# @package _global_
# Ablation B: VLM + VGGT dual cross-attn + ACT head, 4-GPU DDP, 35k steps.

defaults:
  - train_libero_spatial_act_delta_15k
  - _self_

output_dir: ./experiments/libero_spatial_vlm_dual_35k_ddp4
checkpoint_name: libero_spatial_vlm_dual_35k_ddp4

max_steps: 35000
save_every_steps: 5000
checkpoint_overwrite: true
auto_resume: false

batch_size: 16
distributed: true
ddp_drop_last: true
ddp_find_unused_parameters: false

num_workers: 12
prefetch_factor: 4
train_cpu_prefetch: 8
train_gpu_pipeline: true
compile_action_expert: false

lr_scale: none
learning_rate_action: 1.0e-4
learning_rate_warmup_steps: 1000
learning_rate_scheduler: cosine
learning_rate_backbone: 0.0
weight_decay: 1.0e-6
adam_beta1: 0.95
adam_beta2: 0.999
adam_eps: 1.0e-8

train_log_every_steps: 1
