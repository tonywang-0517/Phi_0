normalize: true
action_stats_path: ./data/libero/libero_spatial_eef_action_stats.json
auto_compute_action_stats: true
cache_video: false
mono_camera: true
cosmos_video_size: [704, 1280]
cosmos_video_crop_scale: null
cosmos_prompt_style: libero_composite
