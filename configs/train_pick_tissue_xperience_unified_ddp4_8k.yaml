# @package _global_
# Phi_0 ACT fine-tune on pick-tissue unified 512-d — 4-GPU DDP, 8k steps.

defaults:
  - train_xperience_unified
  - override /data: pick_tissue_xperience_unified
  - _self_

seed: 20260626
output_dir: ./experiments/pick_tissue_xperience_unified_8k_ddp4
checkpoint_name: pick_tissue_xperience_unified_act
max_steps: 8000
save_every_steps: 4000
checkpoint_overwrite: true
auto_resume: false

batch_size: 16
num_workers: 8
prefetch_factor: 6
dataloader_max_workers_per_rank: 8
dataloader_max_dataset_copies: 72
train_cpu_prefetch: 6
train_gpu_pipeline: true
train_gpu_pipeline_depth: 3
mixed_precision: bf16
distributed: false
ddp_drop_last: true
ddp_find_unused_parameters: false

learning_rate_warmup_steps: 500
learning_rate_scheduler: cosine

data:
  seq_len: 33
  auto_compute_action_stats: true
  action_stats_path: ${oc.env:PHI0_WORKSPACE,/home/user}/Isaac-GR00T/data/pick_tissue_xperience_unified/meta/stats_pick_tissue_unified.json
